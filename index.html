<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Legacy Mini Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
        <h1 class="text-2xl font-bold text-center mb-6 text-green-400">🔒 Cyber-Legacy Crypto-Warmup</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1 text-gray-400">Secret Note / Asset Credentials</label>
            <textarea id="secretNote" rows="3" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-green-500 text-white" placeholder="Type your sensitive data here..."></textarea>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-1 text-gray-400">Master Encryption Password</label>
            <input id="masterKey" type="password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-green-500 text-white" placeholder="Enter security key">
        </div>

        <div class="flex gap-4 mb-6">
            <button onclick="lockData()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Encrypted & Lock
            </button>
            <button onclick="unlockData()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Decrypt & Unlock
            </button>
        </div>

        <div class="p-4 bg-gray-950 rounded-lg border border-gray-800">
            <span class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Vault / Database View:</span>
            <div id="vaultOutput" class="font-mono text-sm break-all text-gray-400 italic">Vault empty. Type a note and lock it.</div>
        </div>
    </div>
<script>
    // Global variable to hold our encrypted string (simulating what our MySQL database would save)
    let simulatedDatabaseRecord = "";

    function lockData() {
        const rawNote = document.getElementById('secretNote').value;
        const password = document.getElementById('masterKey').value;

        if (!rawNote || !password) {
            alert("❌ Please provide both a secret note and a password!");
            return;
        }

        // 🛡️ ENCRYPTION LINE: Scrambles the raw note using AES-256 algorithm
        const encryptedCiphertext = CryptoJS.AES.encrypt(rawNote, password).toString();

        // Save it to our simulated database variable
        simulatedDatabaseRecord = encryptedCiphertext;

        // Clear the input box so the raw note disappears from view!
        document.getElementById('secretNote').value = "";
        
        // Show the user what the database actually sees
        document.getElementById('vaultOutput').innerText = simulatedDatabaseRecord;
        document.getElementById('vaultOutput').classList.remove('text-gray-400', 'italic');
        document.getElementById('vaultOutput').classList.add('text-green-400');
    }

    function unlockData() {
        const password = document.getElementById('masterKey').value;

        if (!simulatedDatabaseRecord) {
            alert("❌ The vault is empty! Lock something first.");
            return;
        }
        if (!password) {
            alert("❌ Enter your password to unlock the data.");
            return;
        }

        try {
            // 🔓 DECRYPTION LINE: Attempts to reverse the scramble using the password provided
            const decryptedBytes = CryptoJS.AES.decrypt(simulatedDatabaseRecord, password);
            const decryptedPlaintext = decryptedBytes.toString(CryptoJS.enc.Utf8);

            // Check if the output string is valid. If password was wrong, it returns empty or breaks.
            if (!decryptedPlaintext) {
                throw new Error("Incorrect Password");
            }

            // Put the successfully decrypted text back into the text area
            document.getElementById('secretNote').value = decryptedPlaintext;
            alert("✅ Data decrypted and restored successfully!");

        } catch (error) {
            alert("🚨 Access Denied! Invalid decryption key. Data remains heavily encrypted.");
        }
    }
</script>
    </body>
</html>
